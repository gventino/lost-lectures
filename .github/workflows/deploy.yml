name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build root book (home)
        run: |
          cd book
          mdbook build
          cp -r build/ ../_site/

      - name: Build class books
        run: |
          for bookdir in */book; do
            [ "$bookdir" = "book" ] && continue
            class=$(dirname "$bookdir")
            echo "Building $class..."
            cd "$bookdir"
            mdbook build
            cp -r build/ "../../_site/$class/"
            cd ../..
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
